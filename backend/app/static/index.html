<!DOCTYPE html>
<html>
<head>
    <title>Decody</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h2>Decody - Meeting Analyzer</h2>

    <input type="file" id="fileInput" />
    <br><br>

    <button onclick="uploadFile()">Upload File</button>

    <div id="uploadResult"></div>

    <textarea id="inputText" rows="8" placeholder="Paste transcript here..."></textarea>
    <br><br>

    <input id="query" placeholder="Ask something (e.g. action items, decisions)" />
    <br><br>

    <button onclick="analyze()">Analyze</button>

    <h2>Results</h2>
    <hr>

    <h3>Action Items</h3>
    <table>
        <thead>
            <tr>
                <th>Who</th>
                <th>What</th>
                <th>When</th>
            </tr>
        </thead>
        <tbody id="actionTable"></tbody>
    </table>

    <h3>Decisions</h3>
    <ul id="decisionList"></ul>

    <script src="/static/script.js"></script>

</body>
</html>
